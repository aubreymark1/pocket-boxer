<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket Boxer Stage 3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Stage 3 Flow</p>
        <h1>Pocket Boxer</h1>
        <p class="subtitle">
          出拳测试流程。包含安全提示、校准、倒计时、挥拳及结果反馈。
        </p>
      </header>

      <main id="app-container">
        <section id="screen-home" class="screen active">
          <h2>准备好开始了吗？</h2>
          <p style="color: var(--muted); margin: 16px 0 24px;">体验完整的出拳测试流程</p>
          <button id="btn-start" class="primary-button">开始测试</button>
        </section>
        
        <section id="screen-safety" class="screen">
          <h2>安全提示</h2>
          <p style="color: var(--accent-warn); margin: 16px 0 24px; max-width: 400px; line-height: 1.6;">
            请确保周围环境安全，握紧手机，避免挥拳时手机飞出伤人或损坏设备。
          </p>
          <button id="btn-safety-ok" class="accent-button">我已了解，继续</button>
        </section>

        <section id="screen-calibrating" class="screen">
          <h2>正在校准</h2>
          <p style="color: var(--muted); margin: 16px 0;">请保持手机静止...</p>
        </section>

        <section id="screen-countdown" class="screen">
          <h2>准备</h2>
          <div id="countdown-display" style="font-size: 80px; font-weight: bold; color: var(--accent); margin: 20px 0;">3</div>
        </section>

        <section id="screen-punch" class="screen">
          <div id="punch-motion-ui">
            <h2 style="color: var(--accent-good);">挥拳吧！</h2>
            <p style="color: var(--muted); margin: 16px 0;">请在此时完成一次短幅度挥拳</p>
          </div>
          <div id="punch-fallback-ui" style="display: none; width: 100%; max-width: 400px;">
            <h2>备用蓄力模式</h2>
            <p style="color: var(--muted); margin: 16px 0;">长按下方按钮蓄力，松手出拳</p>
            <div class="charge-bar">
              <div id="fallback-charge-fill" class="charge-fill"></div>
            </div>
            <button id="btn-fallback-charge" class="charge-button" style="margin-top: 20px;">按住蓄力</button>
          </div>
        </section>

        <section id="screen-result" class="screen">
          <h2>测试结果</h2>
          <p id="res-message" style="color: var(--muted); margin: 8px 0 24px;"></p>
          <div class="result-grid" style="margin-bottom: 32px; width: 100%; max-width: 400px;">
            <div class="result-card result-score">
              <span class="result-label">分数</span>
              <strong id="res-score">--</strong>
            </div>
            <div class="result-card">
              <span class="result-label">峰值</span>
              <strong id="res-peak">--</strong>
            </div>
          </div>
          <div style="display: flex; gap: 16px; justify-content: center;">
            <button id="btn-retry" class="accent-button">再来一次</button>
            <button id="btn-home" class="secondary-button">返回首页</button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
    <script>
      // UI Animation Patch
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'childList' || mutation.type === 'characterData') {
            const target = mutation.target.nodeType === 3 ? mutation.target.parentElement : mutation.target;
            
            if (target.id === 'result-score' && target.textContent !== '--') {
              target.classList.remove('pop-anim');
              void target.offsetWidth;
              target.classList.add('pop-anim');
              
              const resultPanel = document.querySelector('.panel-result');
              resultPanel.classList.remove('fade-in-anim');
              void resultPanel.offsetWidth;
              resultPanel.classList.add('fade-in-anim');
            }
            
            if (target.id === 'charge-value') {
              target.classList.remove('scale-anim');
              void target.offsetWidth;
              target.classList.add('scale-anim');
            }
            
            if (target.id === 'status-chip') {
              if (target.textContent === '测试中') {
                document.body.classList.add('is-punching');
              } else {
                document.body.classList.remove('is-punching');
              }
            }
          }
        });
      });
      observer.observe(document.querySelector('.dashboard'), { childList: true, subtree: true, characterData: true });
    </script>
  </body>
</html>
