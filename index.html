<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pocket Boxer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main id="app-container">
        
        <!-- HOME SCREEN -->
        <section id="screen-home" class="screen active">
          <div class="game-logo" style="margin-bottom: 20px;">
            <h1 style="font-size: 48px; margin: 0; line-height: 1;">口袋拳击手</h1>
            <p style="color: var(--muted); margin: 12px 0 0; font-size: 16px; font-weight: bold; letter-spacing: 1px;">
              握紧手机，挥出你的重拳
            </p>
          </div>
          
          <div class="punching-bag-container">
            <div class="punching-bag" id="bag-home"></div>
          </div>

          <div style="margin-top: auto; width: 100%;">
            <button id="btn-start" class="accent-button" style="font-size: 28px; padding: 16px; width: 100%; margin-bottom: 12px;">开始游戏</button>
            <p style="color: var(--muted); font-size: 14px; margin: 0;">握稳手机，向前挥拳即可击打</p>
          </div>
        </section>
        
        <!-- SAFETY SCREEN -->
        <section id="screen-safety" class="screen">
          <h2 style="color: var(--accent-warn); font-size: 32px; margin-bottom: 24px;">⚠️ 安全提示</h2>
          <div class="info-row" style="margin-bottom: 40px; text-align: left; padding: 24px;">
            <p style="color: #fff; margin: 0; line-height: 1.8; font-size: 16px;">
              请确保周围环境安全，<strong style="color: var(--accent-warn);">紧紧握住手机</strong>。<br><br>
              避免挥拳时手机脱手伤人或损坏设备。
            </p>
          </div>
          <button id="btn-safety-ok" class="primary-button" style="width: 100%; font-size: 24px; padding: 16px;">我已抓紧，继续</button>
        </section>

        <!-- CALIBRATING SCREEN -->
        <section id="screen-calibrating" class="screen">
          <div class="punching-bag-container" style="opacity: 0.5;">
            <div class="punching-bag"></div>
          </div>
          <h2 class="pulse-text" style="color: var(--accent-alt); font-size: 28px; margin-top: 32px;">正在校准...</h2>
          <p style="color: #fff; margin: 12px 0 0; font-size: 16px;">请保持手机静止</p>
        </section>

        <!-- COUNTDOWN SCREEN -->
        <section id="screen-countdown" class="screen">
          <div class="punching-bag-container">
            <div class="punching-bag"></div>
          </div>
          <h2 style="color: #fff; font-size: 28px; margin: 24px 0 0; position: absolute; top: 10%;">准备</h2>
          <div id="countdown-display" class="pop-anim" style="position: absolute; font-size: 180px; font-weight: bold; color: var(--accent-good); text-shadow: 8px 8px 0 #000; font-family: var(--font-arcade); z-index: 10;">3</div>
        </section>

        <!-- PUNCH SCREEN -->
        <section id="screen-punch" class="screen">
          <div id="punch-motion-ui" style="width: 100%;">
            <h2 id="punch-instruction" class="pulse-text" style="color: var(--accent); font-size: 36px; text-shadow: 4px 4px 0 #000; margin: 0 0 24px; position: absolute; top: 10%;">挥动手机，击打沙包！</h2>
            
            <div class="punching-bag-container" style="margin-top: 40px; transform: scale(1.2);">
              <div class="punching-bag" id="bag-punch"></div>
            </div>
          </div>

          <div id="punch-fallback-ui" style="display: none; width: 100%; position: absolute; bottom: 40px; padding: 0 24px;">
            <div style="background: rgba(255, 140, 0, 0.15); border: 2px dashed var(--accent-warn); padding: 12px; margin-bottom: 16px; border-radius: 8px;">
              <h2 style="color: var(--accent-alt); font-size: 20px; margin-bottom: 8px;">传感器不可用</h2>
              <p style="color: #fff; font-size: 14px; margin: 0;">已切换至蓄力模式，请长按下方按钮蓄力，松手出拳</p>
            </div>
            <div class="charge-bar" style="height: 36px; border-width: 3px; margin-bottom: 24px;">
              <div id="fallback-charge-fill" class="charge-fill"></div>
            </div>
            <button id="btn-fallback-charge" class="charge-button" style="height: 80px; font-size: 24px;">按住蓄力</button>
          </div>
        </section>

        <!-- RESULT SCREEN -->
        <section id="screen-result" class="screen">
          <h2 id="result-title" style="font-size: 48px; color: var(--accent-good); margin: 0; text-shadow: 4px 4px 0 #000; position: absolute; top: 8%; z-index: 10; font-family: var(--font-arcade); font-style: italic;">命中！</h2>
          
          <div class="punching-bag-container bag-hit" style="margin-top: 40px; transform: scale(1.2);">
            <div class="punching-bag" id="bag-result"></div>
          </div>
          
          <div id="damage-hud" class="pop-anim" style="position: absolute; top: 40%; color: #fff; text-shadow: 4px 4px 0 #000; font-family: var(--font-arcade); z-index: 20; text-align: center;">
            <div style="font-size: 24px; color: var(--accent-alt);">伤害值</div>
            <div id="res-damage" style="font-size: 64px; color: var(--accent);">-1240</div>
          </div>
          
          <div class="result-hud" style="width: 100%; position: absolute; bottom: 120px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left;">
              <div style="font-size: 14px; color: var(--muted); font-weight: bold;">出拳指数</div>
              <div id="res-score" style="font-size: 48px; color: var(--accent-good); font-family: var(--font-arcade); text-shadow: 3px 3px 0 #000;">--</div>
            </div>
            <div style="text-align: right;">
              <div style="font-size: 14px; color: var(--muted); font-weight: bold;">拳击评级</div>
              <div id="res-rating" style="font-size: 32px; color: #fff; font-family: var(--font-arcade); text-shadow: 3px 3px 0 #000;">HEAVY HIT</div>
            </div>
          </div>
          
          <div style="width: 100%; position: absolute; bottom: 24px; padding: 0 24px;">
            <button id="btn-retry" class="accent-button" style="font-size: 24px; padding: 16px; width: 100%;">再来一拳</button>
          </div>
          <button id="btn-home" type="button" hidden aria-hidden="true" tabindex="-1"></button>
        </section>

      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
    <script>
      // UI Animation Patch
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'childList' || mutation.type === 'characterData') {
            const target = mutation.target.nodeType === 3 ? mutation.target.parentElement : mutation.target;
            
            if (target.id === 'res-score' && target.textContent !== '--') {
              target.classList.remove('pop-anim');
              void target.offsetWidth;
              target.classList.add('pop-anim');
              
              const damageHud = document.getElementById('damage-hud');
              if (damageHud) {
                damageHud.classList.remove('pop-anim');
                void damageHud.offsetWidth;
                damageHud.classList.add('pop-anim');
              }
              
              const resultBag = document.getElementById('bag-result');
              if (resultBag) {
                const bagContainer = resultBag.parentElement;
                bagContainer.classList.remove('bag-hit');
                void bagContainer.offsetWidth;
                bagContainer.classList.add('bag-hit');
              }
            }
            
            if (target.id === 'countdown-display') {
              target.classList.remove('pop-anim');
              void target.offsetWidth;
              target.classList.add('pop-anim');
            }
          }
        });
      });
      observer.observe(document.querySelector('#app-container'), { childList: true, subtree: true, characterData: true });
    </script>
  </body>
</html>
